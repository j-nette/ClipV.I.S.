<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClipV.I.S. — Gesture</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: #000; color: #e5e7eb;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
      #scene { position: fixed; inset: 0; overflow: hidden; }
      #overlay {
        position: fixed; inset: 0; z-index: 5; pointer-events: none;
        width: 100%; height: 100%;
        display: none;
      }
      .info-layer {
        position: absolute; inset: 0; z-index: 8; pointer-events: none;
      }
      .orb-card {
        position: absolute;
        min-width: 120px;
        max-width: min(320px, calc(100vw - 32px));
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid rgba(125, 211, 252, 0.4);
        background: rgba(8, 15, 28, 0.82);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.32);
        color: #dbeafe;
        transform: translate(-50%, -135%);
        backdrop-filter: blur(12px);
        opacity: 0.88;
        transition: opacity 0.15s, transform 0.15s, border-color 0.15s, background 0.15s;
      }
      .orb-card.expanded {
        opacity: 1;
        border-color: rgba(103, 232, 249, 0.9);
        background: rgba(12, 20, 36, 0.94);
        transform: translate(-50%, -148%);
      }
      .orb-title {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #67e8f9;
      }
      .orb-body {
        max-height: 0;
        margin-top: 0;
        overflow: hidden;
        font-size: 13px;
        line-height: 1.5;
        color: #cbd5e1;
        opacity: 0;
        transition: max-height 0.18s, margin-top 0.18s, opacity 0.18s;
      }
      .orb-card.expanded .orb-body {
        max-height: 160px;
        margin-top: 8px;
        opacity: 1;
      }
      .orb-editor {
        position: absolute; left: 16px; top: 64px;
        width: min(360px, calc(100vw - 32px));
        padding: 16px;
        border-radius: 18px;
        border: 1px solid rgba(34, 211, 238, 0.35);
        background: rgba(8, 15, 28, 0.92);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(16px);
        color: #e5e7eb;
        pointer-events: auto;
        display: none;
      }
      .orb-editor.show { display: block; }
      .orb-editor h2 {
        margin: 0 0 6px;
        font-size: 16px;
        color: #f8fafc;
      }
      .orb-editor p {
        margin: 0 0 14px;
        font-size: 12px;
        line-height: 1.5;
        color: #94a3b8;
      }
      .orb-editor label {
        display: block;
        margin-top: 10px;
        margin-bottom: 6px;
        font-size: 12px;
        font-weight: 600;
        color: #bae6fd;
      }
      .orb-editor input,
      .orb-editor textarea {
        width: 100%;
        border: 1px solid rgba(71, 85, 105, 0.9);
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.96);
        color: #e5e7eb;
        padding: 10px 12px;
        font: inherit;
      }
      .orb-editor textarea {
        min-height: 110px;
        resize: vertical;
      }
      .orb-editor-actions {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }
      .orb-editor button {
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      .orb-editor button[type="submit"] {
        background: linear-gradient(135deg, #22d3ee, #2563eb);
        color: #020617;
      }
      .orb-editor button[type="button"] {
        background: rgba(30, 41, 59, 0.95);
        color: #cbd5e1;
        border: 1px solid rgba(71, 85, 105, 0.9);
      }
      #hud {
        position: fixed; left: 16px; bottom: 16px; z-index: 10;
        padding: 12px 14px; border-radius: 10px;
        background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(6px);
        font-size: 13px; line-height: 1.5; pointer-events: none;
        display: none;
      }
      #hud b { color: #22d3ee; }
      /* Dev mode (?debug) reveals the skeleton overlay and key help. */
      body.debug #overlay,
      body.debug #metrics,
      body.debug #hud { display: block; }
      #status {
        position: fixed; right: 16px; top: 16px; z-index: 10;
        padding: 6px 10px; border-radius: 8px;
        background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(6px);
        font-size: 12px; color: #9ca3af;
      }
      #gesture-state {
        position: fixed; left: 50%; top: 16px; transform: translateX(-50%); z-index: 10;
        padding: 8px 18px; border-radius: 999px;
        background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(6px);
        border: 2px solid #374151;
        font-size: 14px; font-weight: 600; letter-spacing: 0.04em; color: #9ca3af;
        transition: color 0.1s, border-color 0.1s, background 0.1s;
      }
      #gesture-state.point { color: #38bdf8; border-color: #38bdf8; }
      #gesture-state.pinch { color: #22c55e; border-color: #22c55e;
        background: rgba(22, 197, 94, 0.15); }
      #metrics {
        position: fixed; left: 16px; top: 16px; z-index: 10;
        padding: 8px 12px; border-radius: 8px;
        background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(6px);
        font-family: ui-monospace, monospace; font-size: 12px; line-height: 1.6;
        color: #cbd5e1; white-space: pre; display: none;
      }
      #metrics b { color: #22d3ee; }
      #toast {
        position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px);
        z-index: 20; max-width: 80vw;
        padding: 10px 16px; border-radius: 10px;
        background: rgba(30, 41, 59, 0.95); border: 1px solid #475569;
        font-size: 13px; color: #e5e7eb;
        opacity: 0; pointer-events: none;
        transition: opacity 0.2s, transform 0.2s;
      }
      #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
      #toast.error { border-color: #ef4444; background: rgba(69, 10, 10, 0.95); }
      kbd {
        background: #1f2937; border: 1px solid #374151; border-radius: 4px;
        padding: 1px 6px; font-family: ui-monospace, monospace; font-size: 12px;
      }
      #open-hologram {
        position: fixed; right: 16px; bottom: 16px; z-index: 12; display: none;
        padding: 10px 16px; border: 0; border-radius: 999px; cursor: pointer;
        font: inherit; font-weight: 700; color: #020617;
        background: linear-gradient(135deg, #22d3ee, #2563eb);
        box-shadow: 0 10px 30px rgba(34, 211, 238, 0.3);
      }
    </style>
  </head>
  <body>
    <div id="scene"></div>
    <canvas id="overlay"></canvas>
    <button id="open-hologram">🔺 Open hologram window</button>
    <div id="status">starting…</div>
    <div id="gesture-state">IDLE</div>
    <div id="metrics"></div>
    <div id="hud">
      <div><b>Gesture — manipulation</b> (2-finger = object · 3-finger = whole assembly)</div>
      <div><b>Rock sign</b> (index + pinky) creates an orb with saved title + description</div>
      <div><kbd>P</kbd> point · <kbd>G</kbd> grab · <kbd>B</kbd> object/assembly · <kbd>← ↑ ↓ →</kbd> move</div>
      <div><kbd>Q</kbd>/<kbd>E</kbd> yaw · <kbd>R</kbd>/<kbd>F</kbd> pitch · <kbd>C</kbd>/<kbd>V</kbd> roll · <kbd>Z</kbd>/<kbd>X</kbd> or wheel = zoom</div>
    </div>
    <div id="toast"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
